set -g default-shell /bin/zsh
# Fix: Added global flag for proper True Color/RGB support
set -ag terminal-features ",tmux-256color:RGB"
set -g extended-keys on
set -g base-index 1
set -g renumber-windows on   
set -g mode-keys vi

set -g prefix C-space
bind C-space send-prefix
# --- STYLING & LAYOUT ---
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"

# Fix: Merged the duplicate lines into one clean bold style
set -g window-status-current-style "fg=colour255,bg=default,bold"
set -g window-status-separator ""

set -g window-status-format "#[fg=colour240]#[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour240]#[default]"
set -g window-status-current-format "#[fg=colour252]#[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour252]#[default]"
set -g status-interval 1
set -g status-left "#S"
set -g status-right "#(cat /tmp/desktop_mode 2>/dev/null || echo IDLE)"
set -g remain-on-exit "off"

# --- KEYBINDINGS ---
# Quick reload using the correct relative path syntax
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

bind b set -g status

# Fix: Clean window-killing without prompts
unbind x
bind x kill-window
bind t new-window
bind X kill-session
# Fast terminal word deletion
bind-key -n C-BSpace send-keys C-w

# --- SCRIPT & APPLICATION LAUNCHERS ---
bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind p run "tmux neww ~/.config/scripts/open-pdf.sh" # doesn't really work
bind g run "cd '#{pane_current_path}' && ~/.config/scripts/open-github.sh"
bind y run "tmux neww -n yazi -c '#{pane_current_path}' ~/.config/scripts/yazi-session.sh"
# bind t run "tmux neww ~/.config/scripts/time.shnd"

# Directory quick-jumps via your dispensary script
bind N run "~/.config/scripts/tmux-session-dispensary.sh /mnt/shared/Obsidian/ZaWaruto"
bind P run "~/.config/scripts/tmux-session-dispensary.sh ~/Projects"
bind C run "~/.config/scripts/tmux-session-dispensary.sh ~/.config"
bind H run "~/.config/scripts/tmux-session-dispensary.sh ~"
bind D run "~/.config/scripts/tmux-session-dispensary.sh ~/Downloads"

# UI Apps
bind G neww -c "#{pane_current_path}" -n "git" -S lazygit

bind O run "tmux neww ~/.config/scripts/links-picker.sh" # what does this evne do 
# bind J run "~/.config/scripts/open-audio-journal.sh" # probably replace this with 
#bind W run "tmux neww -n work-mode 'bash ~/.config/scripts/work-mode.sh toggle; printf \"\\nPress enter to close... \"; read -r _'" # this is sylvans take on this 
bind W run " ~/.config/scripts/links-picker.sh"
bind e neww -S -n "LINKS" "nvim ~/.config/links.tsv"
bind E show-environment -g
