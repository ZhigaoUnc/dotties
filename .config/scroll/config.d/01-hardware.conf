## Output configuration
#
# Default wallpaper (more resolutions are available in @datadir@/backgrounds/scroll/)
# output * bg @datadir@/backgrounds/scroll/Sway_Wallpaper_Blue_1920x1080.png fill
#
# Example configuration:

### Output configuration
output eDP-1 scale 1.2 force adaptive_sync on

# You can get the names of your outputs by running: scrollmsg -t get_outputs

### Idle configuration
#
# Example configuration:
#
# exec swayidle -w \
#          timeout 300 'swaylock -f -c 000000' \
#          timeout 600 'scrollmsg "output * power off"' resume 'scrollmsg "output * power on"' \
#          before-sleep 'swaylock -f -c 000000'
#
# This will lock your screen after 300 seconds of inactivity, then turn off
# your displays after another 300 seconds, and turn your screens back on when
# resumed. It will also lock your screen before your computer goes to sleep.

### Input configuration
#

   input type:touchpad {
       dwt enabled
       tap enabled
      natural_scroll enabled
       middle_emulation enabled

   }

#input "type:keyboard" {
#    xkb_layout "us"
 #   xkb_options "ctrl:nocaps"
#}

#
# You can also configure each device individually.
# Read `man 5 scroll-input` for more information about this section.

# 3-Finger Swiping: Move focus between windows/columns
# Swiping right moves focus to the right; swiping left moves focus to the left
bindgesture swipe:3:right focus right
bindgesture swipe:3:left  focus left

# 4-Finger Swiping: Quick jumps to specific workspaces
# 4 Fingers Up -> Workspace 1 (Your Browser)
# 4 Fingers Down -> Workspace 5 (Your Socials/Discord)
bindgesture swipe:4:up    workspace number 1
bindgesture swipe:4:down  workspace number 5
